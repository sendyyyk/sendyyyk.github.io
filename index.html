<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!--Font-->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Acme&family=Alice&family=Domine:wght@500&family=Oswald:wght@600&display=swap&family=Passion+One&display=swap'&family=Orbitron:wght@400..900&display=swap&family=Alex+Brush" rel="stylesheet">
    <!--Icon-->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>Beranda</title>
</head>
<body>
    <header class="header-content pc" id="header">
        <div class="header-navbar">
            <div class="pop-up-theme" hidden>
                <div class="box-pop-up">
                    <div class="checklist">
                        <div class="box-checklist">
                            <div class="line-checklist"></div>
                        </div>
                    </div>
                    <div class="caption-pop-up">
                        <h1 class="text-caption">
                            <span>
                                <!--Text Caption-->
                            </span>
                        </h1>
                    </div>
                    <div class="btn-pop-up">
                        <button type="button" class="pop-up-ok">
                            OK
                        </button>
                    </div>
                </div>
            </div>
            <div class="header-menu container-xxl">
                <div class="logo-wrap">
                    <div class="logo-name">
                        <h1>
                            <a href="">
                                Sendy Cheeks
                            </a>
                        </h1>
                    </div>
                </div>
                <nav class="navbar">
                    <div class="menu-bar">
                        <ul>
                            <li class="list-item">
                                <a href="">
                                    <span class="name">Home</span>
                                </a>
                            </li>
                            <li class="list-item">
                                <a href="">
                                    <span class="name">About</span>
                                </a>
                            </li>
                            <li class="list-item">
                                <a href="">
                                    <span class="name">Skill</span>
                                </a>
                            </li>
                            
                        </ul>
                    </div>
                    <div class="dark-mode">
                        <div class="dark-mode-wrap">
                            <div class="btn-mode">
                                <button type="button" class="theme-mode">
                                    <i class="material-icons">
                                        dark_mode
                                    </i>
                                </button>
                            </div>
                        </div>
                    </div>
                </nav>
            </div>
        </div>
        <div class="header-hero" id="hero-image">
            <div class="hero-primary-item">
                <div class="hero-title-center container-xxl">
                    <div class="title-contact">
                        <div class="hero-title">
                            <h1 class="name-title">
                                Hallo, Selamat Datang
                            </h1>
                        </div>
                        <div class="box-contact">
                            <a href="#" class="contact">
                                <span>Contact Me</span>
                            </a>
                        </div>
                        <div class="screen-content">
                            <div class="box-update">
                                <div class="update-picture" id="updateImage">
                                    <div class="label-update">
                                        <h1 class="label-center">
                                            <span class="name">
                                                update !
                                            </span>
                                        </h1>
                                    </div>
                                    <div class="update-time">
                                        <div class="date">
                                            22 - 09 -2002
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main class="main-content">
        <div class="main-container container-xxl">
            <div class="main-scroll-time-date">
                <section class="time-digital-content">
                    <div class="time-digital">
                        <h1 id="display-time"> 
                            <!--TIME-->
                        </h1>
                    </div>
                </section>
                <section class="date-digital-content">
                    <div class="date-digital">
                        <h1 id="display-date"> 
                            <!--DATE-->
                            x

                    </div>
                </section>
                <section class="scroll-text-content">
                    <div class="scroll-text">
                        <div class="display-scroll-text">
                            <div class="scroll-mode">
                                <h1 id="display-text">
                                    TERIMA KASIH SUDAH MENGUNJUNGI WEBSITE SAYA. SEMOGA HARI HARI MU BAHAGIA ⸜(｡˃ ᵕ ˂ )⸝♡
                                </h1>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
            <div class="main-slide-show">
                <section class="slide-show-content">
                    <div class="display-slide-show">
                        <ul id="slideTransform">
                            <li class="list-item-slide">
                                <a href="">
                                    <img src="assets/img-vid/default/update-image-8K-5.png" alt="">
                                </a>
                            </li>
                            <li class="list-item-slide">
                                <a href="">
                                    <img src="assets/img-vid/default/update-image-8K-1.png" alt="">
                                </a>
                            </li>
                            <li class="list-item-slide">
                                <a href="">
                                    <img src="assets/img-vid/default/update-image-8K-2.png" alt="">
                                </a>
                            </li>
                            <li class="list-item-slide">
                                <a href="">
                                    <img src="assets/img-vid/default/update-image-8K-3.png" alt="">
                                </a>
                            </li>
                            <li class="list-item-slide">
                                <a href="">
                                    <img src="assets/img-vid/default/update-image-8K-4.png" alt="">
                                </a>
                            </li>
                            <li class="list-item-slide">
                                <a href="">
                                    <img src="assets/img-vid/default/update-image-8K-5.png" alt="">
                                </a>
                            </li>
                            <li class="list-item-slide">
                                <a href="">
                                    <img src="assets/img-vid/default/update-image-8K-1.png" alt="">
                                </a>
                            </li>
                        </ul>
                    </div>
                </section>
                <section class="btn-slide-show">
                    <div class="btn-primary-item">
                        <div class="btn-prev-item">
                            <button type="button" class="prev-btn" id="prevSlideBtn"></button>
                        </div>
                        <div class="btn-dot-item">
                            <ul>
                                <li><button class="point-btn">1</button></li>
                                <li><button class="point-btn">2</button></li>
                                <li><button class="point-btn">3</button></li>
                                <li><button class="point-btn">4</button></li>
                                <li><button class="point-btn">5</button></li>
                            </ul>
                        </div>
                        <div class="btn-next-item">
                            <button type="button" class="next-btn" id="nextSlideBtn"></button>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>
    <script src="assets/javascript/script.js"></script>
